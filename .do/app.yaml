name: biggie-pos
services:
- name: biggie-pos
  source_dir: /
  github:
    repo: Hospitality-POS/biggie_pos
    branch: master
  run_command: npm start
  environment_slug: node-js
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /
  build_command: pnpm install && pnpm run build
  output_dir: dist
